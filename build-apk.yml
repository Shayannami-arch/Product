name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    container:
      image: kivy/buildozer:latest
      env:
        HOME: /home/user

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p /home/user/.buildozer
          mkdir -p bin
          chmod -R u+rwX /home/user
          chmod -R u+rwX .

      - name: Show project files
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f
          buildozer --version
          python3 --version || python --version

      - name: Clean old build
        run: |
          rm -rf .buildozer
          rm -rf bin
          mkdir -p bin

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          cat buildozer.spec
          buildozer android debug 2>&1 | tee build.log

      - name: Show output files
        if: always()
        run: |
          echo "BIN FILES:"
          ls -la bin || true
          echo "APK SEARCH:"
          find . -name "*.apk" -type f || true
          echo "LAST LOG LINES:"
          tail -n 180 build.log || true

      - name: Upload APK and Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ProductApp-APK-and-Logs
          path: |
            bin/*.apk
            build.log
            .buildozer/**/*.log
